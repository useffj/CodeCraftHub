<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCraftHub - Learning Management Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            color: #8B5CF6;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        h1 span {
            color: #F59E0B;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .add-course-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .add-course-section h2 {
            color: #8B5CF6;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        input, textarea, select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #8B5CF6;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #8B5CF6;
            color: white;
        }

        .btn-primary:hover {
            background: #7C3AED;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.3);
        }

        .btn-success {
            background: #F59E0B;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .btn-success:hover {
            background: #D97706;
        }

        .btn-danger {
            background: #EF4444;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .btn-danger:hover {
            background: #DC2626;
        }

        .btn-secondary {
            background: #6B7280;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .btn-secondary:hover {
            background: #4B5563;
        }

        .courses-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .courses-section h2 {
            color: #8B5CF6;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .course-card {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }

        .course-card:hover {
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.2);
            border-color: #8B5CF6;
        }

        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .course-title {
            font-size: 1.4em;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .course-date {
            font-size: 0.85em;
            color: #999;
        }

        .course-description {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .course-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
        }

        .meta-label {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 3px;
        }

        .meta-value {
            font-weight: 600;
            color: #333;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-not-started {
            background: #FEE2E2;
            color: #991B1B;
        }

        .status-in-progress {
            background: #FEF3C7;
            color: #92400E;
        }

        .status-completed {
            background: #D1FAE5;
            color: #065F46;
        }

        .course-actions {
            display: flex;
            gap: 10px;
        }

        .message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            animation: slideIn 0.3s ease-out;
        }

        .message-success {
            background: #D1FAE5;
            color: #065F46;
            border-left: 4px solid #10B981;
        }

        .message-error {
            background: #FEE2E2;
            color: #991B1B;
            border-left: 4px solid #EF4444;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #8B5CF6;
            font-size: 1.6em;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
            padding: 0;
            width: 30px;
            height: 30px;
        }

        .close-modal:hover {
            color: #333;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .empty-state-text {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .courses-grid {
                grid-template-columns: 1fr;
            }

            .course-actions {
                flex-direction: column;
            }

            .course-actions button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Code<span>Craft</span>Hub</h1>
            <p class="subtitle">Your Learning Management Platform</p>
        </header>

        <div id="messageContainer"></div>

        <section class="add-course-section">
            <h2>Add New Course</h2>
            <form id="addCourseForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="courseName">Course Name *</label>
                        <input type="text" id="courseName" required>
                    </div>
                    <div class="form-group">
                        <label for="targetDate">Target Date *</label>
                        <input type="date" id="targetDate" required>
                    </div>
                    <div class="form-group">
                        <label for="status">Status *</label>
                        <select id="status" required>
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label for="description">Description *</label>
                        <textarea id="description" required></textarea>
                    </div>
                </div>
                <button type="submit" class="btn-primary">
                    <span id="addButtonText">Add Course</span>
                </button>
            </form>
        </section>

        <section class="courses-section">
            <h2>Your Courses</h2>
            <div id="coursesContainer">
                <div class="loading-overlay" style="position: relative; height: 200px;">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </section>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Course</h2>
                <button class="close-modal" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="editCourseForm">
                <input type="hidden" id="editCourseId">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="editCourseName">Course Name *</label>
                        <input type="text" id="editCourseName" required>
                    </div>
                    <div class="form-group">
                        <label for="editTargetDate">Target Date *</label>
                        <input type="date" id="editTargetDate" required>
                    </div>
                    <div class="form-group">
                        <label for="editStatus">Status *</label>
                        <select id="editStatus" required>
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label for="editDescription">Description *</label>
                        <textarea id="editDescription" required></textarea>
                    </div>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn-secondary" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn-success">
                        <span id="editButtonText">Update Course</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-spinner"></div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5001/api/courses';

        // Fetch and display all courses
        async function fetchCourses() {
            try {
                const response = await fetch(API_BASE_URL);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const courses = await response.json();
                displayCourses(courses);
            } catch (error) {
                console.error('Error fetching courses:', error);
                showMessage('Failed to load courses. Please check if the API server is running.', 'error');
                document.getElementById('coursesContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <div class="empty-state-text">Unable to connect to the API</div>
                        <p>Make sure the backend server is running at ${API_BASE_URL}</p>
                    </div>
                `;
            }
        }

        // Display courses in the UI
        function displayCourses(courses) {
            const container = document.getElementById('coursesContainer');

            if (courses.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <div class="empty-state-text">No courses yet</div>
                        <p>Add your first course using the form above!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="courses-grid">
                    ${courses.map(course => createCourseCard(course)).join('')}
                </div>
            `;
        }

        // Create HTML for a single course card
        function createCourseCard(course) {
            const statusClass = course.status.toLowerCase().replace(' ', '-');
            const formattedDate = new Date(course.created_at).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });

            return `
                <div class="course-card">
                    <div class="course-header">
                        <div style="flex: 1;">
                            <div class="course-title">${escapeHtml(course.name)}</div>
                            <div class="course-date">Created: ${formattedDate}</div>
                        </div>
                    </div>
                    <div class="course-description">${escapeHtml(course.description)}</div>
                    <div class="course-meta">
                        <div class="meta-item">
                            <div class="meta-label">Target Date</div>
                            <div class="meta-value">${course.target_date}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Status</div>
                            <div class="meta-value">
                                <span class="status-badge status-${statusClass}">${course.status}</span>
                            </div>
                        </div>
                    </div>
                    <div class="course-actions">
                        <button class="btn-success" onclick="openEditModal(${course.id})">Edit</button>
                        <button class="btn-danger" onclick="deleteCourse(${course.id})">Remove</button>
                    </div>
                </div>
            `;
        }

        // Add new course
        document.getElementById('addCourseForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const courseData = {
                name: document.getElementById('courseName').value.trim(),
                description: document.getElementById('description').value.trim(),
                target_date: document.getElementById('targetDate').value,
                status: document.getElementById('status').value
            };

            // Validate required fields
            if (!courseData.name || !courseData.description || !courseData.target_date) {
                showMessage('Please fill in all required fields.', 'error');
                return;
            }

            const button = document.getElementById('addButtonText');
            const originalText = button.textContent;
            button.innerHTML = '<span class="spinner"></span> Adding...';

            try {
                const response = await fetch(API_BASE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(courseData)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const newCourse = await response.json();
                showMessage('Course added successfully!', 'success');

                // Reset form
                document.getElementById('addCourseForm').reset();

                // Refresh course list
                await fetchCourses();
            } catch (error) {
                console.error('Error adding course:', error);
                showMessage('Failed to add course. Please try again.', 'error');
            } finally {
                button.textContent = originalText;
            }
        });

        // Open edit modal
        window.openEditModal = async (courseId) => {
            try {
                const response = await fetch(`${API_BASE_URL}/${courseId}`);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const course = await response.json();

                document.getElementById('editCourseId').value = course.id;
                document.getElementById('editCourseName').value = course.name;
                document.getElementById('editDescription').value = course.description;
                document.getElementById('editTargetDate').value = course.target_date;
                document.getElementById('editStatus').value = course.status;

                document.getElementById('editModal').classList.add('active');
            } catch (error) {
                console.error('Error fetching course:', error);
                showMessage('Failed to load course details.', 'error');
            }
        };

        // Close edit modal
        window.closeEditModal = () => {
            document.getElementById('editModal').classList.remove('active');
            document.getElementById('editCourseForm').reset();
        };

        // Update course
        document.getElementById('editCourseForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const courseId = document.getElementById('editCourseId').value;
            const courseData = {
                name: document.getElementById('editCourseName').value.trim(),
                description: document.getElementById('editDescription').value.trim(),
                target_date: document.getElementById('editTargetDate').value,
                status: document.getElementById('editStatus').value
            };

            // Validate required fields
            if (!courseData.name || !courseData.description || !courseData.target_date) {
                showMessage('Please fill in all required fields.', 'error');
                return;
            }

            const button = document.getElementById('editButtonText');
            const originalText = button.textContent;
            button.innerHTML = '<span class="spinner"></span> Updating...';

            try {
                const response = await fetch(`${API_BASE_URL}/${courseId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(courseData)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                showMessage('Course updated successfully!', 'success');
                closeEditModal();
                await fetchCourses();
            } catch (error) {
                console.error('Error updating course:', error);
                showMessage('Failed to update course. Please try again.', 'error');
            } finally {
                button.textContent = originalText;
            }
        });

        // Delete course
        window.deleteCourse = async (courseId) => {
            if (!confirm('Are you sure you want to delete this course? This action cannot be undone.')) {
                return;
            }

            showLoadingOverlay();

            try {
                const response = await fetch(`${API_BASE_URL}/${courseId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                showMessage('Course deleted successfully!', 'success');
                await fetchCourses();
            } catch (error) {
                console.error('Error deleting course:', error);
                showMessage('Failed to delete course. Please try again.', 'error');
            } finally {
                hideLoadingOverlay();
            }
        };

        // Show message
        function showMessage(message, type) {
            const container = document.getElementById('messageContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${type}`;
            messageDiv.textContent = message;

            container.appendChild(messageDiv);

            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }

        // Show/hide loading overlay
        function showLoadingOverlay() {
            document.getElementById('loadingOverlay').style.display = 'flex';
        }

        function hideLoadingOverlay() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal when clicking outside
        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target.id === 'editModal') {
                closeEditModal();
            }
        });

        // Initialize
        fetchCourses();
    </script>
</body>
</html>
